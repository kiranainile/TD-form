<div class="container mt-5">
  <div class="row">
    <div class="col-12 col-md-6 offset-md-3">
      <div class="card">
        <div class="card-body">

          <form #signup="ngForm" (ngSubmit)="onSubmit()">

            <div class="form-group">
              <label for="username"><b>Username</b></label>

              <input
                required
                minlength="8"
                name="username"
                ngModel
                #userName="ngModel"
                type="text"
                class="form-control">

              <strong
                *ngIf="userName.errors?.['required'] && userName.touched"
                class="text-danger">
                Username is required
              </strong>

              <strong
                *ngIf="userName.errors?.['minlength'] && userName.touched"
                class="text-danger">
                Min length of user should be 5
              </strong>
            </div>

            <div class="form-group">
              <label for="email"><b>Email</b></label>

              <input
                required
                name="email"
                ngModel
                #email="ngModel"
                type="text"
                class="form-control">

              <strong
                *ngIf="email.invalid && email.touched"
                class="text-danger">
                Email is a required field.
              </strong>
            </div>

            <div class="text-center mt-3">
              <button class="btn btn-sm btn-block w-100 btn-primary">
                SignUp
              </button>
            </div>

          </form>

        </div>
      </div>
    </div>
  </div>
